<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --primary: #e2a03f;
  --text: #e0e0e0;
  --text-dim: #888;
  --border: #2a2a4a;
  --user-bg: #1e3a5f;
  --assistant-bg: #16213e;
  --error: #ef5350;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header h1 {
  font-size: 18px;
  color: var(--primary);
  font-weight: 600;
}
header .status {
  font-size: 12px;
  color: var(--text-dim);
  margin-left: auto;
}
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.message {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 12px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.message.user {
  align-self: flex-end;
  background: var(--user-bg);
  border-bottom-right-radius: 4px;
}
.message.assistant {
  align-self: flex-start;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.message.error {
  align-self: center;
  background: rgba(239,83,80,0.15);
  color: var(--error);
  font-size: 14px;
}
.message .role {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}
#input-area {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  gap: 12px;
}
#input-area textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 14px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 44px;
  max-height: 200px;
  outline: none;
}
#input-area textarea:focus {
  border-color: var(--primary);
}
#input-area button {
  background: var(--primary);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 0 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
#input-area button:hover { opacity: 0.9; }
#input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-dim);
  font-size: 14px;
  padding: 8px 16px;
}
.loading .dot {
  width: 6px; height: 6px;
  background: var(--primary);
  border-radius: 50%;
  animation: pulse 1.4s infinite;
}
.loading .dot:nth-child(2) { animation-delay: 0.2s; }
.loading .dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>
<header>
  <h1>⚡ Hermes Agent</h1>
  <span class="status" id="status">ready</span>
</header>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
  <button id="send-btn" onclick="send()">Send</button>
</div>
<script>
const msgs = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
let sessionId = null;
let loading = false;

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="role">${role}</div>${escapeHtml(text)}`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addError(text) {
  const div = document.createElement('div');
  div.className = 'message error';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loading-indicator';
  div.innerHTML = 'Thinking<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeLoading() {
  const el = document.getElementById('loading-indicator');
  if (el) el.remove();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function send() {
  const message = input.value.trim();
  if (!message || loading) return;

  loading = true;
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  statusEl.textContent = 'thinking...';

  addMessage('user', message);
  addLoading();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, session_id: sessionId }),
    });
    const data = await res.json();

    removeLoading();

    if (data.error) {
      addError(data.error);
    } else {
      sessionId = data.session_id;
      addMessage('assistant', data.response);
    }
    statusEl.textContent = 'ready';
  } catch (e) {
    removeLoading();
    addError('Connection failed. Is the server running?');
    statusEl.textContent = 'error';
  }

  loading = false;
  sendBtn.disabled = false;
  input.focus();
}

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});
</script>
</body>
</html>
